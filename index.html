<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>臨床資料重建行動｜國防醫學大學 口腔醫學營・思維挑戰</title>
<link rel="icon" type="image/jpeg" href="assets/dental-camp-logo.jpg">
<link rel="stylesheet" href="style.css?v=202607211815">
</head>
<body>

<div id="app">

  <!-- ============ 開場：隊名輸入 ============ -->
  <section id="screen-brief" class="brief-screen">
    <div class="brief-header">
      <img class="brief-logo" src="assets/dental-camp-logo.jpg" alt="國防醫學大學 口腔醫學營 Logo">
      <div class="camp-badge">國防醫學大學 口腔醫學營　·　思維挑戰</div>
      <div class="kicker">CASE FILE A19 — RESTRICTED</div>
      <h1>臨床資料重建行動</h1>
      <div class="sub">教學醫院口腔顎面部門 · 病歷重建任務 · 全程計時，無時間限制</div>
    </div>
    <div class="panel">
      <div class="case-tag">任務簡報</div>
      <div class="brief-text" id="briefing-text"></div>
      <details class="knowledge" open>
        <summary>解謎慣例說明（請務必先讀）</summary>
        <div class="kbody" id="conventions-text"></div>
      </details>
      <div class="team-form">
        <input type="text" id="team-name-input" placeholder="請輸入你們的小組隊名" maxlength="20" autocomplete="off">
        <button class="start-btn" id="start-btn">開始任務，啟動計時</button>
      </div>
      <div class="form-err" id="team-form-err"></div>
      <button class="staff-link-btn" id="stage-jump-open-brief">工作人員專用：跳至指定關卡</button>
    </div>
  </section>

  <!-- ============ 遊戲主畫面 ============ -->
  <section id="screen-game" class="hidden">
    <div class="topbar">
      <div class="topbar-left">
        <img class="topbar-logo" src="assets/dental-camp-logo.jpg" alt="營隊 Logo">
        <div>
          <div class="camp-tag">國防醫學大學 口腔醫學營 · 思維挑戰</div>
          <div class="brand"><strong>臨床資料重建行動</strong> · A19 病歷重建</div>
          <div class="team-name" id="topbar-team"></div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="sos-btn" id="sos-btn">SOS 求救提示（已用 <span id="sos-count">0</span> 次）</button>
        <div class="timer" id="timer-display">00:00</div>
      </div>
    </div>

    <div class="progress-track" id="progress-track"></div>

    <div class="panel stage-panel" id="stage-panel"></div>

    <div class="foot-note">
      每組每次可使用 SOS 提示查看下一條線索 · 提示會依關卡累計顯示
      <br>
      <button class="staff-link-btn" id="end-session-btn">工作人員專用：提前結束本隊任務</button>
      <button class="staff-link-btn" id="stage-jump-open-game">工作人員專用：跳至指定關卡</button>
    </div>
  </section>

  <!-- ============ 過關 / 劇情 覆蓋層 ============ -->
  <div id="story-overlay" class="story-overlay hidden">
    <div class="story-card">
      <div class="story-stamp">VERIFIED ✓</div>
      <div class="story-title" id="story-title"></div>
      <div class="story-text" id="story-text"></div>
      <button class="story-next-btn" id="story-next-btn">繼續調查</button>
    </div>
  </div>

  <!-- ============ 結局頁 ============ -->
  <section id="screen-end" class="hidden end-screen">
    <div class="panel" id="end-panel"></div>
  </section>

  <!-- ============ 工作人員：跳至指定關卡 ============ -->
  <div id="stage-jump-panel" class="stage-jump-overlay hidden">
    <div class="stage-jump-card">
      <div class="stage-jump-title">工作人員專用：跳至指定關卡</div>
      <div class="input-group">
        <label>工作人員密碼</label>
        <input type="password" id="jump-password" autocomplete="off">
      </div>
      <div class="input-group">
        <label>跳至第幾關（1-10）</label>
        <input type="number" id="jump-stage" min="1" max="10" autocomplete="off">
      </div>
      <div class="form-err" id="jump-err"></div>
      <div class="stage-jump-btn-row">
        <button class="start-btn" id="jump-confirm-btn">前往</button>
        <button class="sos-btn" id="jump-cancel-btn">取消</button>
      </div>
    </div>
  </div>

</div>

<script src="assets/emailjs.min.js"></script>
<script src="assets/html2canvas.min.js"></script>
<script src="assets/jspdf.umd.min.js"></script>
<script src="data.js?v=202607211815"></script>
<script src="app.js?v=202607211815"></script>
</body>
</html>
